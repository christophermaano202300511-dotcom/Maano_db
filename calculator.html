<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - Delator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-lightning-charge"></i> Delator
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="calculator.html">Calculator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="results.html">Results</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">Profile</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> Account
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="login.html">Login</a></li>
                            <li><a class="dropdown-item" href="register.html">Register</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Calculator Section -->
    <section class="calculator-section py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="glass-card calculator-card p-5">
                        <h2 class="text-center mb-4">
                            <i class="bi bi-calculator"></i> Bill Calculator
                        </h2>
                        
                        <form id="calculatorForm">
                            <div class="mb-4">
                                <label for="kwh" class="form-label">
                                    <i class="bi bi-lightning"></i> kWh Consumption
                                </label>
                                <input type="number" class="form-control input-glass" id="kwh" placeholder="Enter kWh consumed" step="0.01" required>
                            </div>

                            <div class="mb-4">
                                <label for="costPerKwh" class="form-label">
                                    <i class="bi bi-cash"></i> Cost per kWh (₱)
                                </label>
                                <input type="number" class="form-control input-glass" id="costPerKwh" placeholder="Enter cost per kWh" step="0.01" value="12.50" required>
                            </div>

                            <div class="mb-4">
                                <label for="month" class="form-label">
                                    <i class="bi bi-calendar"></i> Month
                                </label>
                                <input type="month" class="form-control input-glass" id="month" required>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="bi bi-calculator"></i> Calculate Bill
                            </button>
                        </form>
                    </div>

                    <!-- Result Section -->
                    <div id="resultSection" class="glass-card result-card p-5 mt-4" style="display: none;">
                        <h3 class="text-center mb-4">Calculation Result</h3>
                        <div class="result-item">
                            <span>kWh Consumed:</span>
                            <span id="resultKwh" class="result-value">-</span>
                        </div>
                        <div class="result-item">
                            <span>Cost per kWh:</span>
                            <span id="resultCostPerKwh" class="result-value">-</span>
                        </div>
                        <div class="divider"></div>
                        <div class="result-item total">
                            <span>Total Bill:</span>
                            <span id="resultTotal" class="result-value accent">₱0.00</span>
                        </div>
                        <button type="button" class="btn btn-success btn-lg w-100 mt-3" onclick="saveBill()">
                            <i class="bi bi-check-circle"></i> Save Bill
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer glass-footer py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p>&copy; 2025 Delator Electric Bill Calculator. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#" class="text-light me-3"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-light me-3"><i class="bi bi-twitter"></i></a>
                    <a href="#" class="text-light"><i class="bi bi-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
