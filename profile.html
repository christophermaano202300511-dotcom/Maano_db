<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Delator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Pirata+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-lightning-charge"></i> Delator
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="calculator.html">Calculator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="results.html">Results</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="profile.html">Profile</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> Account
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="login.html">Login</a></li>
                            <li><a class="dropdown-item" href="register.html">Register</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Profile Section -->
    <section class="profile-section py-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-4 mb-4">
                    <!-- Profile Card -->
                    <div class="glass-card p-5 text-center">
                        <div class="profile-avatar mb-3">
                            <i class="bi bi-person-circle"></i>
                        </div>
                        <h3 id="profileName">John Michael</h3>
                        <p class="text-muted">Premium Member</p>
                        <hr>
                        <div class="profile-stats">
                            <div class="stat">
                                <p class="stat-label">Total Bills</p>
                                <p class="stat-value" id="totalBills">0</p>
                            </div>
                            <div class="stat">
                                <p class="stat-label">Total Spent</p>
                                <p class="stat-value" id="totalSpent">₱0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <!-- Edit Profile Form -->
                    <div class="glass-card p-5 mb-4">
                        <h3 class="mb-4">Edit Profile Information</h3>
                        <form id="profileForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control input-glass" id="firstName" value="John" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control input-glass" id="lastName" value="Michael" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control input-glass" id="email" value="john.michael@email.com" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control input-glass" id="phone" value="+63 9XX XXX XXXX" required>
                                </div>
                                <div class="col-12">
                                    <label for="address" class="form-label">Address</label>
                                    <input type="text" class="form-control input-glass" id="address" value="123 Electric Street, Metro Manila" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg mt-4">
                                <i class="bi bi-check-circle"></i> Save Changes
                            </button>
                        </form>
                    </div>

                    <!-- Security Section -->
                    <div class="glass-card p-5">
                        <h3 class="mb-4">Security & Password</h3>
                        <form id="passwordForm">
                            <div class="mb-4">
                                <label for="currentPassword" class="form-label">Current Password</label>
                                <input type="password" class="form-control input-glass" id="currentPassword" placeholder="Enter current password" required>
                            </div>
                            <div class="mb-4">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" class="form-control input-glass" id="newPassword" placeholder="Enter new password" required>
                            </div>
                            <div class="mb-4">
                                <label for="confirmNewPassword" class="form-label">Confirm New Password</label>
                                <input type="password" class="form-control input-glass" id="confirmNewPassword" placeholder="Confirm new password" required>
                            </div>
                            <button type="submit" class="btn btn-warning btn-lg">
                                <i class="bi bi-shield-lock"></i> Change Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer glass-footer py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <p>&copy; 2025 Delator Electric Bill Calculator. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#" class="text-light me-3"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-light me-3"><i class="bi bi-twitter"></i></a>
                    <a href="#" class="text-light"><i class="bi bi-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadProfileData();
            
            const profileForm = document.getElementById('profileForm');
            if (profileForm) {
                profileForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveProfile();
                });
            }

            const passwordForm = document.getElementById('passwordForm');
            if (passwordForm) {
                passwordForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    changePassword();
                });
            }
        });

        function loadProfileData() {
            const profile = JSON.parse(localStorage.getItem('userProfile')) || {};
            const bills = JSON.parse(localStorage.getItem('bills')) || [];

            let totalSpent = 0;
            bills.forEach(bill => {
                totalSpent += bill.totalBill;
            });

            const name = (profile.firstName || 'John') + ' ' + (profile.lastName || 'Michael');
            document.getElementById('profileName').textContent = name;
            document.getElementById('firstName').value = profile.firstName || 'John';
            document.getElementById('lastName').value = profile.lastName || 'Michael';
            document.getElementById('email').value = profile.email || 'john.michael@email.com';
            document.getElementById('phone').value = profile.phone || '+63 9XX XXX XXXX';
            document.getElementById('address').value = profile.address || '123 Electric Street, Metro Manila';
            document.getElementById('totalBills').textContent = bills.length;
            document.getElementById('totalSpent').textContent = '₱' + totalSpent.toFixed(2);
        }

        function saveProfile() {
            const profile = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                lastUpdated: new Date().toLocaleString()
            };

            localStorage.setItem('userProfile', JSON.stringify(profile));
            alert('Profile updated successfully!');
            loadProfileData();
        }

        function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;

            if (!newPassword || !confirmPassword) {
                alert('Please fill in all fields');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            alert('Password changed successfully!');
            document.getElementById('passwordForm').reset();
        }
    </script>
</body>
</html>
